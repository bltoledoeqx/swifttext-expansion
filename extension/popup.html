<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>SnapText</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="popup-body">
  <div class="popup surface-premium ring-hairline animate-float-up">
    <!-- Header -->
    <header class="popup-header">
      <div class="brand">
        <div class="brand-logo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">SnapText</span>
          <span class="brand-version mono">v2.1 · pro</span>
        </div>
        <span class="status-pill mono">
          <span class="status-dot glow-dot"></span>
          ON
        </span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-add" title="Novo snippet">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="icon-btn" id="btn-settings" title="Configurações">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Buscar snippet ou /atalho…" class="search-input mono" />
        <kbd class="search-kbd">⌘K</kbd>
      </div>
    </div>

    <!-- List header -->
    <div class="list-meta">
      <span class="mono" id="count">0 snippets</span>
      <span class="mono suggested">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
        sugeridos
      </span>
    </div>

    <!-- Snippet list -->
    <div class="snippet-list" id="snippet-list"></div>

    <!-- Footer -->
    <footer class="popup-footer mono">
      <div class="footer-left">
        <span><kbd>↑↓</kbd> navegar</span>
        <span><kbd>Tab</kbd> inserir</span>
      </div>
      <button class="footer-link" id="open-dashboard">
        Dashboard
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M7 7h10v10"/></svg>
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
